<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋寶釣竿</title>
    <style>
        :root {
            --bg-top: #0b1021;
            --bg-bottom: #1b274c;
            --water-top: #102142;
            --water-bottom: #081024;
            --primary: #38bdf8;
            --accent: #f43f5e;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            height: 100dvh; width: 100vw;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background: linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-bottom) 40%, var(--water-top) 40.1%, var(--water-bottom) 100%);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--panel-bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        /* 左側控制面板 */
        aside {
            width: 320px;
            background-color: rgba(30, 41, 59, 0.95);
            border-right: 2px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 5px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        aside h2 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
            font-size: 22px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        textarea {
            flex: 1;
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 2px solid #334155;
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            resize: none;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); }
        
        .checkbox-row {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
            cursor: pointer;
        }
        .checkbox-row input { margin-right: 8px; accent-color: var(--primary); width: 16px; height: 16px;}

        .btn-reset {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        .btn-reset:hover { background: rgba(56, 189, 248, 0.1); }
        .btn-reset:active { transform: translateY(2px); }

        .drawn-section { flex: 0.8; display: flex; flex-direction: column; }
        .drawn-section h3 { font-size: 14px; color: var(--primary); margin: 0 0 8px 0; }
        .drawn-list {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px 10px 10px 25px;
            margin: 0;
            overflow-y: auto;
            font-size: 14px;
            color: #cbd5e1;
        }

        /* 右側主畫面 */
        main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: crosshair; /* 提示可以在水面上點擊 */
        }

        /* 浮動提示文字 */
        .instruction-toast {
            position: absolute;
            top: 20px;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            pointer-events: none;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 背景畫布 (星空、水波、碎片、星星) */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 貓咪釣客 SVG */
        .fisher-cat {
            position: absolute;
            bottom: 30%; 
            left: 20%;
            width: 150px;
            height: 150px;
            z-index: 5;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.8));
            pointer-events: none;
        }

        /* 釣魚線 */
        #fishing-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* 浮標 (Bobber) */
        .bobber-container {
            position: absolute;
            top: 60%; 
            left: 60%;
            width: 40px; height: 40px;
            z-index: 5;
            transform: translate(-50%, -50%);
            /* CSS 動畫移除，改用 JS 平滑補間移動 */
        }
        
        .bobber {
            width: 16px; height: 36px;
            background: linear-gradient(to bottom, #ef4444 50%, #ffffff 50%);
            border-radius: 8px;
            margin: 0 auto;
            border: 2px solid #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: float 2s ease-in-out infinite;
            transform-origin: bottom center;
            transition: transform 0.1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        /* 浮標狀態類別 */
        .bobber.twitch {
            animation: none;
            transform: translateY(8px) rotate(15deg);
        }
        .bobber.sink {
            animation: none;
            transform: translateY(30px) scale(0.8);
            opacity: 0.3;
        }

        /* 驚嘆號 ! */
        .exclamation {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            color: #ef4444;
            font-size: 64px;
            font-weight: 900;
            font-family: monospace;
            text-shadow: 0 0 10px #000, 0 0 20px #ef4444;
            opacity: 0;
            transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .exclamation.show {
            transform: translateX(-50%) scale(1);
            opacity: 1;
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(-50%) scale(1) rotate(-5deg); }
            50% { transform: translateX(-50%) scale(1) rotate(5deg); }
        }

        /* 漣漪圈圈 */
        .ripple {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30px; height: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            opacity: 0;
            animation: ripple-anim 2s infinite;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            0% { width: 10px; height: 3px; opacity: 1; }
            100% { width: 60px; height: 20px; opacity: 0; }
        }

        /* 互動按鈕 (拋竿 / 拉竿) */
        .action-area {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            pointer-events: none; /* 讓點擊穿透到水面 */
        }
        .action-area button { pointer-events: auto; } /* 按鈕本身可以點擊 */

        .status-text {
            color: var(--primary);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px #000;
            min-height: 25px;
        }

        .btn-action {
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: white;
            border: 4px solid #fff;
            padding: 20px 60px;
            font-size: 28px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #0369a1, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-action:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 #0369a1, 0 5px 10px rgba(0,0,0,0.5);
        }
        .btn-action.btn-pull {
            background: linear-gradient(135deg, #f43f5e, #be123c);
            box-shadow: 0 10px 0 #881337, 0 10px 20px rgba(0,0,0,0.5);
        }
        .btn-action.btn-pull:active {
            box-shadow: 0 0px 0 #881337, 0 5px 10px rgba(0,0,0,0.5);
        }
        .btn-action:disabled {
            filter: grayscale(100%);
            pointer-events: none;
            opacity: 0.5;
        }

        /* 釣起的寶箱/物品動畫 */
        .loot-item {
            position: absolute;
            top: 60%; left: 60%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 80px;
            opacity: 0;
            z-index: 15;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }
        .loot-item.fly {
            transform: translate(-50%, -300px) scale(1.5) rotate(360deg);
            opacity: 1;
        }

        /* 結果 Modal */
        #result-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #result-modal.show { opacity: 1; pointer-events: auto; }

        .result-card {
            background: #fdf6e3; 
            border: 8px solid #854d0e;
            border-radius: 10px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform: scale(0.8) translateY(50px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #451a03;
            background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.05"/></svg>');
        }
        #result-modal.show .result-card { transform: scale(1) translateY(0); }
        
        .res-subtitle { font-size: 18px; margin-bottom: 10px; font-weight: bold; color: #78350f;}
        
        #res-hero {
            font-size: 52px;
            font-weight: 900;
            color: #9f1239;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
        }

        #res-quote {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: bold;
            text-align: left;
            padding: 20px;
            border-top: 2px dashed #b45309;
            border-bottom: 2px dashed #b45309;
        }

        .btn-continue {
            background: #854d0e;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-continue:active { transform: scale(0.95); }

        /* 閃光特效 */
        .flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: white; z-index:40; opacity:0; pointer-events: none;
        }
        .flash.active { animation: flash-anim 0.5s ease-out; }
        @keyframes flash-anim { 0% { opacity:1; } 100% { opacity:0; } }

        /* 手機版適配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; height: 35%; border-right: none; border-bottom: 2px solid #334155; padding: 15px;}
            .fisher-cat { width: 100px; height: 100px; bottom: 35%; left: 5%; }
            .btn-action { padding: 15px 40px; font-size: 24px; }
            .result-card { padding: 25px 20px; }
            #res-hero { font-size: 40px; }
            #res-quote { font-size: 16px; padding: 15px 5px;}
            .instruction-toast { font-size: 12px; top: 10px; }
        }
    </style>
</head>
<body>

    <!-- 左側面板 -->
    <aside>
        <h2>🎣 尋寶釣竿</h2>
        <textarea id="hero-list">
數據分析師喵
法律專家喵
程式魔法師
水豚老師
粉紅獨角獸
小火龍
史萊姆
布丁狗
酷洛米
吉伊卡哇
小八
兔兔
飛天小女警</textarea>
        
        <label class="checkbox-row">
            <input type="checkbox" id="remove-drawn" checked>
            <span>釣起後將成員移出名冊</span>
        </label>

        <button id="update-btn" class="btn-reset">↺ 重置名單</button>

        <div class="drawn-section">
            <h3>📜 已被打撈的成員：</h3>
            <ul id="drawn-list" class="drawn-list"></ul>
        </div>
    </aside>

    <!-- 右側主畫面 -->
    <main id="main-area">
        <div class="instruction-toast">⌨️ 方向鍵 / 點擊水面 可控制釣線方向</div>
        
        <canvas id="bg-canvas"></canvas>
        <svg id="fishing-line"></svg>
        <div class="flash" id="flash"></div>

        <!-- 貓咪釣客 SVG -->
        <svg class="fisher-cat" viewBox="0 0 100 100">
            <path d="M 20 90 C 20 60, 40 40, 60 40 C 70 40, 80 50, 85 70 L 90 90 Z" fill="#0f172a" />
            <circle cx="50" cy="35" r="18" fill="#0f172a" />
            <polygon points="35,25 30,5 45,20" fill="#0f172a" />
            <polygon points="65,25 70,5 55,20" fill="#0f172a" />
            <ellipse cx="45" cy="32" rx="3" ry="5" fill="#fde047" />
            <ellipse cx="60" cy="32" rx="3" ry="5" fill="#fde047" />
            <line id="rod-line" x1="60" y1="50" x2="120" y2="-10" stroke="#78350f" stroke-width="4" stroke-linecap="round"/>
        </svg>

        <!-- 浮標區域 -->
        <div class="bobber-container" id="bobber-container">
            <div class="exclamation" id="exclamation">!</div>
            <div class="bobber" id="bobber"></div>
            <div class="ripple" id="ripple"></div>
        </div>

        <!-- 釣起物品 -->
        <div class="loot-item" id="loot-item">🍾</div>

        <!-- 互動按鈕 -->
        <div class="action-area">
            <div class="status-text" id="status-text">湖面很平靜...</div>
            <button class="btn-action" id="btn-action">拋竿</button>
        </div>

        <!-- 結果 Modal -->
        <div id="result-modal">
            <div class="result-card">
                <div class="res-subtitle">📜 打撈起的物品裡，藏著被命運選中的名字...</div>
                <div id="res-hero">水豚老師</div>
                <div id="res-quote">✨ 正在解讀釣起的神祕物品訊息...</div>
                <button id="btn-continue" class="btn-continue">收下名單</button>
            </div>
        </div>
    </main>

    <script>
        // === 遊戲狀態變數 ===
        const STATE = {
            IDLE: 'IDLE',       
            WAITING: 'WAITING', 
            BITING: 'BITING',   
            RESULT: 'RESULT'    
        };

        let currentState = STATE.IDLE;
        let availableHeroes = [];
        let drawnHeroes = [];
        
        let fakeBiteTimer = null;
        let realBiteTimer = null;
        let escapeTimer = null;

        // 浮標位置控制 (平滑補間)
        let targetBobberX = 60; // %
        let targetBobberY = 60; // %
        let currentBobberX = 60;
        let currentBobberY = 60;

        // 釣起的奇葩物品清單
        const WEIRD_LOOTS = [
            { text: "算力超強的青花菜", emoji: "🥦" },
            { text: "會寫 Python 的高麗菜", emoji: "🥬" },
            { text: "自帶演算法的胡蘿蔔", emoji: "🥕" },
            { text: "儲存海量大數據的玉米", emoji: "🌽" },
            { text: "精通深度學習的茄子", emoji: "🍆" },
            { text: "會神經網路的洋蔥", emoji: "🧅" },
            { text: "懂得特徵萃取的番茄", emoji: "🍅" },
            { text: "雲端運算毒蘑菇", emoji: "🍄" }
        ];
        let currentLootItem = null;

        // API Key (預設留空供系統注入)
        const apiKey = ""; 

        // DOM Elements
        const heroListArea = document.getElementById('hero-list');
        const updateBtn = document.getElementById('update-btn');
        const removeCheckbox = document.getElementById('remove-drawn');
        const drawnListUI = document.getElementById('drawn-list');
        
        const mainArea = document.getElementById('main-area');
        const btnAction = document.getElementById('btn-action');
        const statusText = document.getElementById('status-text');
        
        const bobberContainer = document.getElementById('bobber-container');
        const bobber = document.getElementById('bobber');
        const exclamation = document.getElementById('exclamation');
        const ripple = document.getElementById('ripple');
        const fishingLineSvg = document.getElementById('fishing-line');
        const lootItem = document.getElementById('loot-item');
        const flash = document.getElementById('flash');
        
        const resultModal = document.getElementById('result-modal');
        const resHero = document.getElementById('res-hero');
        const resQuote = document.getElementById('res-quote');
        const btnContinue = document.getElementById('btn-continue');

        // Canvas 背景 (星空、水波、碎片、星星特效)
        const bgCanvas = document.getElementById('bg-canvas');
        const ctx = bgCanvas.getContext('2d');
        let stars = [];
        let debrisList = [];
        let particles = [];
        let skyUfos = [];

        function initCanvas() {
            bgCanvas.width = mainArea.clientWidth;
            bgCanvas.height = mainArea.clientHeight;
            stars = [];
            // 畫星星
            for(let i=0; i<100; i++) {
                stars.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * (bgCanvas.height * 0.4), 
                    radius: Math.random() * 1.5,
                    alpha: Math.random(),
                    speed: 0.01 + Math.random() * 0.03
                });
            }
            
            // 水面奇葩漂流物
            debrisList = [];
            // 增加 UFO 的比例
            const debrisEmojis = ["🐟", "🌿", "🦆", "🥾", "🦴", "📜", "🪵", "🐙", "🛸", "🛸", "🛸", "🛸"];
            for(let i=0; i<10; i++) {
                debrisList.push({
                    x: Math.random() * bgCanvas.width,
                    y: bgCanvas.height * 0.45 + Math.random() * (bgCanvas.height * 0.5),
                    speed: (Math.random() - 0.5) * 0.8,
                    emoji: debrisEmojis[Math.floor(Math.random() * debrisEmojis.length)],
                    waveOffset: Math.random() * Math.PI * 2
                });
            }

            // 星空飛碟
            skyUfos = [];
            for(let i=0; i<3; i++) {
                skyUfos.push({
                    x: Math.random() * bgCanvas.width,
                    y: 20 + Math.random() * (bgCanvas.height * 0.25),
                    speed: (Math.random() > 0.5 ? 1 : -1) * (0.3 + Math.random() * 0.5),
                    wobble: Math.random() * Math.PI * 2
                });
            }
        }

        // 產生星星爆炸特效
        function addStarExplosion(cx, cy, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: cx, y: cy,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15 - 5,
                    life: 1.0,
                    color: `hsla(${Math.random()*360}, 100%, 75%, ` // 保留結尾以加上 alpha
                });
            }
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            // 畫星星
            stars.forEach(star => {
                star.alpha += star.speed;
                if(star.alpha > 1 || star.alpha < 0.2) star.speed *= -1;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
            });

            // 畫星空飛碟 (放大版)
            ctx.font = "45px Arial"; 
            skyUfos.forEach(ufo => {
                ufo.x += ufo.speed;
                if(ufo.x < -60) ufo.x = bgCanvas.width + 60;
                if(ufo.x > bgCanvas.width + 60) ufo.x = -60;
                const y = ufo.y + Math.sin(Date.now() * 0.002 + ufo.wobble) * 8;
                ctx.fillText("🛸", ufo.x, y);
            });

            // 畫水波倒影
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            const time = Date.now() * 0.001;
            for(let i=0; i<5; i++) {
                const y = bgCanvas.height * 0.45 + i * 40;
                const width = 100 + Math.sin(time + i) * 50;
                ctx.fillRect(bgCanvas.width * 0.6 - width/2, y, width, 2);
            }

            // 畫漂流碎片
            ctx.font = "20px Arial";
            debrisList.forEach(d => {
                d.x += d.speed;
                if(d.x < -30) d.x = bgCanvas.width + 30;
                if(d.x > bgCanvas.width + 30) d.x = -30;
                const y = d.y + Math.sin(time * 2 + d.waveOffset) * 5;
                ctx.globalAlpha = 0.4; // 在水裡微透
                ctx.fillText(d.emoji, d.x, y);
            });
            ctx.globalAlpha = 1.0;

            // 畫動態星星特效 (釣魚時的小星星 & 爆炸星星)
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if(p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.fillStyle = p.color + p.life + ')'; 
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            // 釣魚等待中，浮標周圍冒小星星
            if (currentState === STATE.WAITING && Math.random() < 0.1) {
                const bx = (currentBobberX / 100) * bgCanvas.width;
                const by = (currentBobberY / 100) * bgCanvas.height;
                particles.push({
                    x: bx + (Math.random()-0.5)*20, 
                    y: by,
                    vx: (Math.random()-0.5)*2,
                    vy: -1 - Math.random()*2,
                    life: 1.0,
                    color: `hsla(50, 100%, 80%, `
                });
            }

            // 平滑移動浮標位置
            currentBobberX += (targetBobberX - currentBobberX) * 0.1;
            currentBobberY += (targetBobberY - currentBobberY) * 0.1;
            bobberContainer.style.left = currentBobberX + '%';
            bobberContainer.style.top = currentBobberY + '%';

            requestAnimationFrame(drawCanvas);
        }

        // 動態繪製釣魚線 (從竿子到浮標)
        function updateFishingLine() {
            const catRect = document.querySelector('.fisher-cat').getBoundingClientRect();
            const bobberRect = bobberContainer.getBoundingClientRect();
            const mainRect = mainArea.getBoundingClientRect();
            
            // 計算竿子頂端相對 main-area 的位置
            const startX = catRect.left - mainRect.left + (catRect.width * 0.9);
            const startY = catRect.top - mainRect.top + (catRect.height * 0.1);
            
            const endX = bobberRect.left - mainRect.left + (bobberRect.width / 2);
            const endY = bobberRect.top - mainRect.top + (bobberRect.height / 2);

            // 繪製二次貝茲曲線 (下垂感)
            let curveY = startY + (endY - startY) * 0.8 + 50; 
            if (currentState === STATE.BITING) curveY -= 100; // 咬鉤時線繃緊

            fishingLineSvg.innerHTML = `
                <path d="M ${startX} ${startY} Q ${startX + (endX-startX)/2} ${curveY} ${endX} ${endY}" 
                      fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
            `;
            requestAnimationFrame(updateFishingLine);
        }

        // === 遊戲核心邏輯 ===
        function init() {
            window.addEventListener('resize', initCanvas);
            initCanvas();
            drawCanvas();
            updateFishingLine();
            parseHeroList();

            // 綁定按鈕
            updateBtn.addEventListener('click', () => {
                parseHeroList();
                drawnHeroes = [];
                updateDrawnUI();
                resetGame();
            });

            btnAction.addEventListener('click', handleAction);
            
            btnContinue.addEventListener('click', () => {
                resultModal.classList.remove('show');
                lootItem.classList.remove('fly');
                setTimeout(resetGame, 500);
            });

            // 綁定方向鍵控線 (鍵盤)
            window.addEventListener('keydown', (e) => {
                if (currentState !== STATE.WAITING && currentState !== STATE.IDLE) return;
                const speed = 3;
                if (e.key === 'ArrowLeft' || e.key === 'a') targetBobberX = Math.max(10, targetBobberX - speed);
                if (e.key === 'ArrowRight' || e.key === 'd') targetBobberX = Math.min(90, targetBobberX + speed);
                if (e.key === 'ArrowUp' || e.key === 'w') targetBobberY = Math.max(45, targetBobberY - speed);
                if (e.key === 'ArrowDown' || e.key === 's') targetBobberY = Math.min(90, targetBobberY + speed);
            });

            // 綁定點擊/觸控水面控線 (滑鼠/手指)
            mainArea.addEventListener('pointerdown', (e) => {
                if (currentState !== STATE.WAITING && currentState !== STATE.IDLE) return;
                const rect = mainArea.getBoundingClientRect();
                let x = ((e.clientX - rect.left) / rect.width) * 100;
                let y = ((e.clientY - rect.top) / rect.height) * 100;
                
                // 限制只能點擊水面區域 (y > 45)
                if (y > 45 && e.target !== btnAction) {
                    targetBobberX = Math.max(10, Math.min(90, x));
                    targetBobberY = Math.max(45, Math.min(90, y));
                }
            });
        }

        function parseHeroList() {
            const text = heroListArea.value;
            availableHeroes = text.split('\n').map(h => h.trim()).filter(h => h.length > 0);
        }

        function updateDrawnUI() {
            drawnListUI.innerHTML = '';
            drawnHeroes.forEach(hero => {
                const li = document.createElement('li');
                li.textContent = hero;
                drawnListUI.appendChild(li);
            });
            drawnListUI.scrollTop = drawnListUI.scrollHeight;
        }

        function handleAction() {
            if (currentState === STATE.IDLE) {
                castLine();
            } else if (currentState === STATE.WAITING) {
                pullEarly();
            } else if (currentState === STATE.BITING) {
                pullSuccess();
            } else if (currentState === STATE.RESULT) {
                resetGame();
            }
        }

        function setActionBtn(text, styleClass) {
            btnAction.textContent = text;
            btnAction.className = `btn-action ${styleClass}`;
        }

        function resetGame() {
            currentState = STATE.IDLE;
            clearAllTimers();
            bobber.className = 'bobber';
            exclamation.classList.remove('show');
            ripple.style.display = 'block';
            statusText.textContent = "湖面很平靜...";
            statusText.style.color = "var(--primary)";
            setActionBtn("拋竿", "");
            
            // 隨機換一個水面目標位置
            targetBobberX = 40 + Math.random() * 40;
            targetBobberY = 50 + Math.random() * 30;
        }

        function clearAllTimers() {
            clearTimeout(fakeBiteTimer);
            clearTimeout(realBiteTimer);
            clearTimeout(escapeTimer);
        }

        // 拋竿
        function castLine() {
            if (availableHeroes.length === 0) {
                alert("沒有魚(名單)可以釣了！請補充名單。");
                return;
            }

            currentState = STATE.WAITING;
            setActionBtn("等待...", "");
            statusText.textContent = "耐心等待... (可用方向鍵/點擊移動浮標)";
            statusText.style.color = "var(--text-muted)";

            // 縮短釣魚等待時間 (1.5 秒 到 3.5 秒)
            const realBiteDelay = 1500 + Math.random() * 2000;
            
            scheduleFakeBite(realBiteDelay);

            realBiteTimer = setTimeout(() => {
                triggerBite();
            }, realBiteDelay);
        }

        function scheduleFakeBite(maxDelay) {
            if (maxDelay < 2000) return; // 時間太短就不假動作了
            const fakeDelay = 800 + Math.random() * (maxDelay - 1500);
            
            fakeBiteTimer = setTimeout(() => {
                if (currentState !== STATE.WAITING) return;
                
                bobber.classList.add('twitch');
                setTimeout(() => {
                    if (currentState === STATE.WAITING) bobber.classList.remove('twitch');
                }, 300);
                
                scheduleFakeBite(maxDelay - fakeDelay);
            }, fakeDelay);
        }

        // 真正的咬鉤 (驚嘆號出現)
        function triggerBite() {
            if (currentState !== STATE.WAITING) return;
            currentState = STATE.BITING;
            
            bobber.classList.add('sink');
            exclamation.classList.add('show');
            setActionBtn("拉竿！", "btn-pull");
            statusText.textContent = "有動靜！！";
            statusText.style.color = "var(--accent)";

            // 玩家只有 1 秒的反應時間
            escapeTimer = setTimeout(() => {
                if (currentState === STATE.BITING) {
                    fishEscaped();
                }
            }, 1000);
        }

        // 太早拉竿
        function pullEarly() {
            currentState = STATE.RESULT;
            clearAllTimers();
            bobber.className = 'bobber';
            statusText.textContent = "太早拉竿了，把魚嚇跑了...";
            statusText.style.color = "#94a3b8";
            setActionBtn("重試", "");
        }

        // 魚跑掉了 (按太慢)
        function fishEscaped() {
            currentState = STATE.RESULT;
            bobber.className = 'bobber';
            exclamation.classList.remove('show');
            statusText.textContent = "太慢了... 魚跑掉了。";
            statusText.style.color = "#94a3b8";
            setActionBtn("重試", "");
        }

        // 成功拉竿！
        async function pullSuccess() {
            currentState = STATE.RESULT;
            clearAllTimers();
            
            bobber.className = 'bobber';
            exclamation.classList.remove('show');
            ripple.style.display = 'none'; 
            
            setActionBtn("釣到了！", "btn-pull");
            btnAction.disabled = true; 
            
            statusText.textContent = "大豐收！";

            // 畫面閃白
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 500);

            // 【星星大爆發特效】
            const bx = (currentBobberX / 100) * bgCanvas.width;
            const by = (currentBobberY / 100) * bgCanvas.height;
            addStarExplosion(bx, by, 60);

            // 決定釣起的名單與物品
            const randomIndex = Math.floor(Math.random() * availableHeroes.length);
            const targetHeroName = availableHeroes[randomIndex];
            
            currentLootItem = WEIRD_LOOTS[Math.floor(Math.random() * WEIRD_LOOTS.length)];

            if (removeCheckbox.checked) {
                availableHeroes.splice(randomIndex, 1);
                heroListArea.value = availableHeroes.join('\n');
            }
            drawnHeroes.push(targetHeroName);
            updateDrawnUI();

            // 寶箱飛出動畫
            lootItem.textContent = currentLootItem.emoji; 
            lootItem.style.left = bobberContainer.style.left;
            lootItem.style.top = bobberContainer.style.top;
            
            void lootItem.offsetWidth; // 強制重繪
            lootItem.classList.add('fly');

            // 顯示抽出名單 (馬上顯示名字！)
            resHero.textContent = `【${targetHeroName}】`;
            resQuote.textContent = "✨ 正在解讀釣起的神祕預言與考試祝福..."; 
            
            setTimeout(() => { resultModal.classList.add('show'); }, 800);

            // 呼叫 AI 產生預言
            try {
                const quote = await fetchQuoteFromGemini(targetHeroName, currentLootItem.text);
                resQuote.textContent = quote;
            } catch (error) {
                console.error("AI 獲取失敗：", error);
                resQuote.textContent = generateFallbackQuote(targetHeroName, currentLootItem.text);
            } finally {
                btnAction.disabled = false;
            }
        }

        // === 串接 Gemini AI ===
        async function fetchQuoteFromGemini(hero, lootName) {
            const prompt = `你是一個負責搞笑 RPG 遊戲的 AI。玩家在星空湖畔釣魚，成功釣起了一個「${lootName}」，打開一看，裡面居然是被命運抽中的考生：「${hero}」！
請以「AI 數據大師」或「神祕預言」的口吻，發表一段「超級荒謬、爆笑的考取【AI中級證書】鼓勵預言」。
【強制要求】：
1. 徹底通靈：無論「${hero}」是知名角色、普通人名或無厘頭的名字，都必須根據名字的「字面意思、諧音、最大特徵或刻板印象」來瞎掰！
2. 結合物品：預言必須解釋為什麼他/她會跟「${lootName}」一起被釣上來（例如：拿青花菜當 GPU 算力、把高麗菜當作數據集訓練、把玉米當隨身碟...等）。
3. 結合機器學習與大數據：必須瘋狂使用 AI 專有名詞（如：過擬合/Overfitting、梯度下降、深度學習、神經網路、特徵萃取、大語言模型）來鼓勵他/她去考「AI中級證書」。
4. 語氣一本正經地胡說八道，字數約 80 - 150 字。
5. 務必使用繁體中文。
請回傳嚴格的 JSON 格式：{"quote": "預言內容"}`;

            const maxRetries = 3;
            const delays = [1000, 2000, 4000];
            
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        quote: { type: "STRING" }
                                    }
                                }
                            }
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    let textContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!textContent) throw new Error("無效的 API 回應");
                    
                    if (textContent.startsWith("```json")) {
                        textContent = textContent.replace(/^```json\n/, "").replace(/\n```$/, "");
                    } else if (textContent.startsWith("```")) {
                        textContent = textContent.replace(/^```\n/, "").replace(/\n```$/, "");
                    }

                    return JSON.parse(textContent).quote;

                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i])); 
                }
            }
        }

        // 本地備用台詞
        function generateFallbackQuote(hero, lootName) {
            const templates = [
                `📜 羊皮紙上寫著：「命運指引了【${hero}】！據說他/她為了準備 AI中級證書，居然拿『${lootName}』來跑深度學習模型，結果算力太強導致時空扭曲被釣上來了。祝你梯度下降順利！」`,
                `📜 物品散發著微光：「數據大師預言，【${hero}】將會在考場中帶著這『${lootName}』當作 GPU 加速器，並使出『防止過擬合之術』，絕對能高分取得 AI 中級證書！」`,
                `📜 底部的紙條寫著：「【${hero}】已經吸取了『${lootName}』的海量大數據，掌握了用眼神訓練神經網路的禁忌魔法，這張 AI 中級證照非他/她莫屬啦！」`
            ];
            return templates[Math.floor(Math.random() * templates.length)];
        }

        window.onload = init;
    </script>
</body>
</html>
